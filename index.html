<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI 智能体学习小组</title>
<style>
/* ===== Reset & Variables ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #92400E;
  --primary-light: #B45309;
  --primary-dark: #78350F;
  --accent: #D97706;
  --bg: #FFFDF7;
  --card-bg: #FFFFFF;
  --text: #1C1917;
  --text-light: #57534E;
  --text-lighter: #A8A29E;
  --border: #E7E5E4;
  --border-light: #F5F5F4;
  --shadow: 0 1px 2px rgba(0,0,0,0.03), 0 1px 3px rgba(0,0,0,0.04);
  --shadow-lg: 0 2px 12px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.03);
  --shadow-card: 0 1px 2px rgba(28,25,23,0.03), 0 3px 12px rgba(28,25,23,0.04);
  --radius: 12px;
  --radius-sm: 10px;
  --font-xl: 26px;
  --font-lg: 18px;
  --font-md: 15px;
  --font-sm: 13px;
  --font-xs: 11px;
}

/* ===== Base ===== */
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--text);
  display: flex;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
  letter-spacing: 0.01em;
}

.container {
  width: 100%;
  max-width: 440px;
  padding: 20px 16px 40px;
  min-height: 100vh;
}

/* ===== Header ===== */
.header {
  text-align: center;
  padding: 24px 0 20px;
}
.header-icon {
  font-size: 48px;
  margin-bottom: 8px;
  display: block;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.header h1 {
  font-size: var(--font-xl);
  font-weight: 700;
  color: var(--text);
}
.header p {
  font-size: var(--font-sm);
  color: var(--text-light);
  margin-top: 4px;
}

/* ===== Counter Card ===== */
.counter-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 20px 24px;
  text-align: center;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}
.counter-number {
  font-size: 56px;
  font-weight: 800;
  color: var(--primary);
  line-height: 1;
  letter-spacing: -0.02em;
}
.counter-label {
  font-size: var(--font-sm);
  color: var(--text-light);
  margin-top: 4px;
}
.progress-bar {
  margin-top: 14px;
  height: 6px;
  background: #E2E8F0;
  border-radius: 100px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #D97706, #92400E);
  border-radius: 100px;
  transition: width 0.5s ease;
}

/* ===== Form Card ===== */
.form-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 24px 20px;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}
.form-card h2 {
  font-size: var(--font-lg);
  font-weight: 700;
  margin-bottom: 18px;
  text-align: center;
}
.form-group {
  margin-bottom: 16px;
}
.form-group label {
  display: block;
  font-size: var(--font-sm);
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}
.form-group input {
  width: 100%;
  height: 50px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0 16px;
  font-size: var(--font-md);
  color: var(--text);
  background: var(--card-bg);
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
}
.form-group input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(146,64,14,0.06);
  background: #FFF;
}
.form-group input::placeholder {
  color: var(--text-lighter);
}
.btn {
  display: block;
  width: 100%;
  height: 50px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: var(--font-md);
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-appearance: none;
}
.btn:active {
  transform: scale(0.97);
}
.btn-primary {
  background: var(--primary);
  color: #FFF;
  box-shadow: 0 2px 8px rgba(146,64,14,0.12);
}
.btn-outline {
  background: var(--card-bg);
  color: var(--primary);
  border: 1.5px solid var(--border);
}
.btn-sm {
  height: 36px;
  width: auto;
  display: inline-block;
  padding: 0 14px;
  font-size: var(--font-sm);
}

/* ===== Status Message ===== */
.status-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 28px 20px;
  text-align: center;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}
.status-icon {
  font-size: 56px;
  display: block;
  margin-bottom: 12px;
}
.status-card h3 {
  font-size: var(--font-lg);
  font-weight: 700;
  margin-bottom: 8px;
}
.status-card p {
  font-size: var(--font-sm);
  color: var(--text-light);
  line-height: 1.6;
}

/* ===== Group Selection Cards ===== */
.section-title {
  font-size: var(--font-lg);
  font-weight: 700;
  text-align: center;
  margin-bottom: 16px;
}

.group-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow-card);
  margin-bottom: 14px;
  position: relative;
  border: 1.5px solid var(--border);
  transition: all 0.2s;
  cursor: pointer;
}
.group-card:active {
  transform: scale(0.98);
}
.group-card.full {
  opacity: 0.5;
  cursor: default;
}
.group-card.full:active {
  transform: none;
}
.group-card.selected {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(146,64,14,0.06);
  background: #FFFDF7;
}
.group-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.group-theme {
  font-size: var(--font-lg);
  font-weight: 700;
}
.group-capacity {
  font-size: var(--font-sm);
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 100px;
}
.capacity-open { background: #ECFDF5; color: #065F46; }
.capacity-full { background: #FEF2F2; color: #991B1B; }
.group-leader {
  font-size: var(--font-sm);
  color: var(--text-light);
  margin-bottom: 12px;
}
.group-people {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 14px;
}
.person-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: #F1F5F9;
  padding: 4px 10px;
  border-radius: 100px;
  font-size: var(--font-xs);
  color: var(--text);
}
.person-tag.leader {
  background: #FEF3C7;
  font-weight: 600;
}

/* ===== My Group View ===== */
.my-group-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 24px 20px;
  box-shadow: var(--shadow-lg);
  margin-bottom: 20px;
  border: 1.5px solid var(--primary);
  background: linear-gradient(180deg, #FFFDF7 0%, #FFFFFF 100%);
}
.my-group-header {
  text-align: center;
  margin-bottom: 20px;
}
.my-group-header .check-icon {
  font-size: 40px;
  display: block;
  margin-bottom: 8px;
}
.my-group-header h3 {
  font-size: var(--font-lg);
  font-weight: 700;
  color: var(--primary-dark);
}
.my-group-theme {
  font-size: var(--font-md);
  color: var(--text-light);
  margin-top: 4px;
}
.member-list {
  border-top: 1px solid var(--border);
  padding-top: 16px;
}
.member-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-light);
}
.member-item:last-child {
  border-bottom: none;
}
.member-info {
  display: flex;
  align-items: center;
  gap: 10px;
}
.member-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--font-sm);
  font-weight: 700;
  color: #FFF;
  flex-shrink: 0;
}
.member-name {
  font-size: var(--font-md);
  font-weight: 600;
}
.member-wechat {
  font-size: var(--font-xs);
  color: var(--text-light);
}
.member-badge {
  font-size: var(--font-xs);
  padding: 2px 8px;
  border-radius: 100px;
  font-weight: 600;
}
.badge-leader { background: #FEF3C7; color: #92400E; }
.badge-you { background: #ECFDF5; color: #065F46; }

/* ===== Admin Panel ===== */
.admin-panel {
  display: none;
}
.admin-panel.active {
  display: block;
}
.admin-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.admin-header h2 {
  font-size: var(--font-lg);
  font-weight: 700;
}
.admin-section {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.admin-section h3 {
  font-size: var(--font-md);
  font-weight: 700;
  margin-bottom: 12px;
  color: var(--text-light);
}
.phase-buttons {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.phase-btn {
  flex: 1;
  min-width: 100px;
  height: 44px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--card-bg);
  font-size: var(--font-sm);
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.phase-btn.active {
  border-color: var(--primary);
  background: #FFFDF7;
  color: var(--primary);
}
.admin-group-item {
  background: #FFFDF7;
  border-radius: var(--radius-sm);
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
}
.admin-group-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.admin-group-row:last-child {
  margin-bottom: 0;
}
.admin-group-row label {
  font-size: var(--font-xs);
  font-weight: 600;
  color: var(--text-light);
  white-space: nowrap;
  min-width: 32px;
}
.admin-group-row input,
.admin-group-row select {
  flex: 1;
  height: 38px;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0 10px;
  font-size: var(--font-sm);
  background: #FFF;
  color: var(--text);
}
.admin-group-row input:focus,
.admin-group-row select:focus {
  outline: none;
  border-color: var(--primary);
}

/* ===== Footer ===== */
.footer {
  text-align: center;
  padding: 20px 0;
}
.footer a {
  font-size: var(--font-xs);
  color: var(--text-lighter);
  text-decoration: none;
  cursor: pointer;
}

/* ===== Modal ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.active {
  display: flex;
}
.modal {
  background: #FFF;
  border-radius: var(--radius);
  padding: 24px 20px;
  width: 100%;
  max-width: 340px;
  box-shadow: var(--shadow-lg);
  text-align: center;
}
.modal h3 {
  font-size: var(--font-lg);
  font-weight: 700;
  margin-bottom: 8px;
}
.modal p {
  font-size: var(--font-sm);
  color: var(--text-light);
  margin-bottom: 18px;
}
.modal input {
  width: 100%;
  height: 48px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0 14px;
  font-size: var(--font-md);
  text-align: center;
  margin-bottom: 14px;
}
.modal input:focus {
  outline: none;
  border-color: var(--primary);
}

/* ===== Toast ===== */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #1E293B;
  color: #FFF;
  padding: 12px 24px;
  border-radius: 100px;
  font-size: var(--font-sm);
  font-weight: 600;
  z-index: 200;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
}

/* ===== Hidden ===== */
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="container" id="app">
  <!-- Header -->
  <div class="header">
    <span class="header-icon">🤖</span>
    <h1>AI 智能体学习小组</h1>
    <p>和小伙伴一起学习，一起进步</p>
  </div>

  <!-- ===== VIEW 1: Sign-in ===== -->
  <div id="view-signin">
    <div class="counter-card">
      <div class="counter-number" id="counter">0</div>
      <div class="counter-label">已签到人数</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="form-card" id="signin-form-card">
      <h2>📝 我要签到</h2>
      <div class="form-group">
        <label>你的昵称</label>
        <input type="text" id="input-nickname" placeholder="怎么称呼你？" maxlength="20" autocomplete="off">
      </div>
      <div class="form-group">
        <label>微信号或手机号</label>
        <input type="text" id="input-wechat" placeholder="方便同组伙伴联系你" maxlength="40" autocomplete="off">
      </div>
      <button class="btn btn-primary" id="btn-signin">提交签到</button>
      <button class="btn btn-outline btn-sm hidden" id="btn-cancel-edit" style="margin-top:8px;">取消修改</button>
      <div style="text-align:center;margin-top:6px" id="signin-hint">
        <span style="font-size:var(--font-xs);color:var(--text-lighter)">签到后等待管理员开放选组</span>
      </div>
    </div>

    <div id="signin-done-card" class="status-card hidden">
      <span class="status-icon">✅</span>
      <h3>签到成功！</h3>
      <p>你好，<strong id="signed-name"></strong></p>
      <p>请耐心等待管理员开放选组<br>届时重新打开本页面即可选择小组</p>
      <button class="btn btn-outline btn-sm" id="btn-resign" style="margin-top:12px;">修改签到信息</button>
    </div>
  </div>

  <!-- ===== VIEW 2: Group Selection ===== -->
  <div id="view-selection" class="hidden">
    <div class="section-title">🎯 请选择你想加入的小组</div>
    <div id="group-list"></div>
  </div>

  <!-- ===== VIEW 3: My Group ===== -->
  <div id="view-mygroup" class="hidden"></div>

  <!-- ===== Footer ===== -->
  <div class="footer">
    <a id="link-leader" class="hidden">组长面板</a>
    <span class="hidden" id="footer-sep" style="color:var(--text-lighter);margin:0 8px;">·</span>
    <a id="link-admin">管理入口</a>
  </div>

  <!-- ===== Admin Modal ===== -->
  <div class="modal-overlay" id="admin-password-modal">
    <div class="modal">
      <h3>🔑 管理员验证</h3>
      <p>请输入管理密码</p>
      <input type="password" id="input-admin-password" placeholder="输入密码" maxlength="20">
      <button class="btn btn-primary" id="btn-admin-login">进入管理面板</button>
      <button class="btn btn-outline btn-sm" id="btn-admin-cancel" style="margin-top:8px;">取消</button>
    </div>
  </div>

  <!-- ===== Leader Panel ===== -->
  <div class="admin-panel" id="leader-panel">
    <div class="admin-section">
      <div class="admin-header">
        <h2>👑 组长面板</h2>
        <button class="btn btn-outline btn-sm" id="btn-leader-close">返回</button>
      </div>
      <p style="font-size:var(--font-sm);color:var(--text-light);margin-bottom:12px;" id="leader-group-info"></p>
      <h3>入组申请</h3>
      <div id="leader-requests"></div>
    </div>
  </div>

<!-- ===== Admin Panel ===== -->
  <div class="admin-panel" id="admin-panel">
    <!-- Phase Control -->
    <div class="admin-section">
      <div class="admin-header">
        <h2>⚙️ 管理面板 <span id="mode-badge" style="font-size:var(--font-xs);font-weight:400;padding:2px 8px;border-radius:100px;background:#E8F5E9;color:#2E7D32;">本地模式</span></h2>
        <button class="btn btn-outline btn-sm" id="btn-admin-close">退出</button>
      </div>
      <p id="firebase-hint" style="font-size:var(--font-xs);color:var(--text-lighter);margin-bottom:12px;">当前为本地模式，数据仅保存在此浏览器。配置Supabase后可多人实时共享。</p>
      <h3>当前阶段</h3>
      <div class="phase-buttons">
        <button class="phase-btn active" data-phase="signup">📝 签到阶段</button>
        <button class="phase-btn" data-phase="selection">🎯 选组阶段</button>
        <button class="phase-btn" data-phase="done">🏁 已结束</button>
      </div>
    </div>

    <!-- Group Management -->
    <div class="admin-section">
      <h3>小组管理</h3>
      <div id="admin-groups"></div>
      <button class="btn btn-primary" id="btn-add-group" style="margin-top:8px;">+ 新增小组</button>
    </div>

    <!-- Participant List -->
    <div class="admin-section">
      <h3>签到人员 (<span id="admin-participant-count">0</span>人)</h3>
      <div id="admin-participants" style="font-size:var(--font-sm);color:var(--text-light);line-height:1.8;"></div>
    </div>

    <!-- Settings -->
    <div class="admin-section" style="text-align:center;">
      <h3>🔧 设置</h3>
      <button class="btn btn-outline btn-sm" id="btn-change-password">修改管理密码</button>
      <button class="btn btn-outline btn-sm" id="btn-export-data" style="margin-left:8px;">导出数据</button>
      <button class="btn btn-outline btn-sm" id="btn-reset-all" style="margin-left:8px;border-color:#C62828;color:#C62828;">清空全部数据</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// Supabase Configuration
// ============================================================
const SUPABASE_CONFIG = {
  url: 'https://pdmkafoursgyesxsijrc.supabase.co',
  anonKey: 'sb_publishable_m0xlWgUw1XyxoEOf-gU3oQ_6JKz9c3A'
};

// ============================================================
// Data Layer (Supabase REST API + localStorage fallback)
// ============================================================
const USER_KEY = 'group_signup_user';
const DEFAULT_ADMIN_PASSWORD = 'admin123';
const TOTAL_TARGET = 55;

let useOnline = false;
let pollTimer = null;

// ----- Supabase REST helpers -----
function supabaseHeaders() {
  return {
    'apikey': SUPABASE_CONFIG.anonKey,
    'Authorization': 'Bearer ' + SUPABASE_CONFIG.anonKey,
    'Content-Type': 'application/json',
  };
}

async function supabaseGet(table, query) {
  let url = SUPABASE_CONFIG.url + '/rest/v1/' + table + '?select=*';
  if (query) url += '&' + query;
  const res = await fetch(url, { headers: supabaseHeaders() });
  if (!res.ok) throw new Error(table + ' get failed: ' + res.status);
  return res.json();
}

async function supabasePost(table, body) {
  const url = SUPABASE_CONFIG.url + '/rest/v1/' + table;
  const res = await fetch(url, {
    method: 'POST', headers: supabaseHeaders(), body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(table + ' insert failed: ' + res.status);
}

async function supabasePatch(table, id, body) {
  const url = SUPABASE_CONFIG.url + '/rest/v1/' + table + '?id=eq.' + encodeURIComponent(id);
  const res = await fetch(url, {
    method: 'PATCH', headers: supabaseHeaders(), body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(table + ' update failed: ' + res.status);
}

async function supabaseDelete(table, id) {
  const url = SUPABASE_CONFIG.url + '/rest/v1/' + table + '?id=eq.' + encodeURIComponent(id);
  const res = await fetch(url, {
    method: 'DELETE', headers: supabaseHeaders()
  });
  if (!res.ok) throw new Error(table + ' delete failed: ' + res.status);
}

function mapParticipant(db) {
  return { id: db.id, nickname: db.nickname, wechatId: db.wechat_id, groupId: db.group_id, createdAt: db.created_at };
}
function mapGroup(db) {
  return { id: db.id, name: db.name, theme: db.theme, leaderId: db.leader_id, maxSize: db.max_size, order: db.sort_order };
}

// ----- Local Storage Helpers -----
function getLocalStore() {
  try {
    const raw = localStorage.getItem('group_signup_data');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { participants: [], groups: [], requests: [], phase: 'signup' };
}
function saveLocalStore(s) {
  localStorage.setItem('group_signup_data', JSON.stringify(s));
}
function getLocalSettings() {
  try {
    const raw = localStorage.getItem('group_signup_settings');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { adminPassword: DEFAULT_ADMIN_PASSWORD };
}
function saveLocalSettings(s) {
  localStorage.setItem('group_signup_settings', JSON.stringify(s));
}

// ----- Admin Password -----
function getAdminPassword() {
  if (useOnline) return window._adminPwd || DEFAULT_ADMIN_PASSWORD;
  return getLocalSettings().adminPassword;
}
function setAdminPassword(newPwd) {
  window._adminPwd = newPwd;
  if (useOnline) {
    supabasePatch('settings', 'main', { admin_password: newPwd }).catch(() => {});
  } else {
    const s = getLocalSettings();
    s.adminPassword = newPwd;
    saveLocalSettings(s);
  }
}

// ----- Current User (per-device, always localStorage) -----
function getCurrentUser() {
  try { const raw = localStorage.getItem(USER_KEY); if (raw) return JSON.parse(raw); } catch(e) {}
  return null;
}
function setCurrentUser(user) { localStorage.setItem(USER_KEY, JSON.stringify(user)); }
function clearCurrentUser() { localStorage.removeItem(USER_KEY); }

// ----- Data Store -----
let store = { participants: [], groups: [], requests: [], phase: 'signup' };

// ============================================================
// Supabase Init (zero-dependency, fetch-only)
// ============================================================
async function initSupabase() {
  const cfg = SUPABASE_CONFIG;
  if (!cfg.url || cfg.url.includes('YOUR')) return false;

  try {
    // Test connection
    const res = await fetch(cfg.url + '/rest/v1/settings?id=eq.main&select=*', {
      headers: { 'apikey': cfg.anonKey, 'Authorization': 'Bearer ' + cfg.anonKey }
    });
    if (!res.ok) return false;

    const sData = await res.json();
    if (sData.length > 0) {
      store.phase = sData[0].phase || 'signup';
      window._adminPwd = sData[0].admin_password || DEFAULT_ADMIN_PASSWORD;
    } else {
      // First time - create settings
      await supabasePost('settings', { id: 'main', admin_password: DEFAULT_ADMIN_PASSWORD, phase: 'signup' });
    }

    // Load initial data (requests may not exist yet)
    const [pData, gData] = await Promise.all([
      supabaseGet('participants'),
      supabaseGet('groups', 'order=sort_order')
    ]);
    store.participants = pData.map(mapParticipant);
    store.groups = gData.map(mapGroup);
    // Cache to localStorage as backup
    saveLocalStore(store);
    // Try loading requests, but don't fail if table doesn't exist
    try {
      const rData = await supabaseGet('requests');
      store.requests = (rData || []).map(r => ({ id: r.id, participantId: r.participant_id, groupId: r.group_id, status: r.status, createdAt: r.created_at }));
    } catch(e) { store.requests = []; }

    // Start polling for real-time updates
    startPolling();
    return true;
  } catch(e) {
    console.warn('Supabase init failed:', e.message);
    return false;
  }
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    try {
      const [pData, gData, sRes] = await Promise.all([
        supabaseGet('participants'),
        supabaseGet('groups', 'order=sort_order'),
        fetch(SUPABASE_CONFIG.url + '/rest/v1/settings?id=eq.main&select=*', {
          headers: { 'apikey': SUPABASE_CONFIG.anonKey, 'Authorization': 'Bearer ' + SUPABASE_CONFIG.anonKey }
        })
      ]);
      store.participants = pData.map(mapParticipant);
      store.groups = gData.map(mapGroup);
      try {
        const rData = await supabaseGet('requests');
        store.requests = (rData || []).map(r => ({ id: r.id, participantId: r.participant_id, groupId: r.group_id, status: r.status, createdAt: r.created_at }));
      } catch(e) { /* table may not exist yet */ }
      if (sRes.ok) {
        const sData = await sRes.json();
        if (sData.length > 0) {
          store.phase = sData[0].phase;
          window._adminPwd = sData[0].admin_password;
        }
      }
      saveLocalStore(store);
      refreshUI();
    } catch(e) { /* silent */ }
  }, 3000);
}

// ============================================================
// Data Operations
// ============================================================
async function addParticipant(data) {
  if (useOnline) {
    await supabasePost('participants', { nickname: data.nickname, wechat_id: data.wechatId, group_id: null });
  } else {
    const p = { id: genId(), nickname: data.nickname, wechatId: data.wechatId, groupId: null, createdAt: Date.now() };
    store.participants.push(p);
    saveLocalStore(store);
    return p;
  }
}

async function updateParticipantGroup(participantId, groupId) {
  if (useOnline) {
    await supabasePatch('participants', participantId, { group_id: groupId });
  } else {
    const p = store.participants.find(x => x.id === participantId);
    if (p) { p.groupId = groupId; saveLocalStore(store); }
  }
}

async function findParticipantByWechat(wechatId) {
  if (useOnline) {
    const res = await fetch(
      SUPABASE_CONFIG.url + '/rest/v1/participants?select=*&wechat_id=eq.' + encodeURIComponent(wechatId),
      { headers: supabaseHeaders() }
    );
    if (!res.ok) return null;
    const data = await res.json();
    return data.length > 0 ? mapParticipant(data[0]) : null;
  } else {
    return store.participants.find(p => p.wechatId === wechatId) || null;
  }
}

async function removeParticipantDb(participantId) {
  if (useOnline) {
    await supabaseDelete('participants', participantId);
  } else {
    store.participants = store.participants.filter(x => x.id !== participantId);
    store.groups.forEach(g => { if (g.leaderId === participantId) g.leaderId = null; });
    saveLocalStore(store);
  }
}

async function addGroupDb() {
  const count = store.groups.length + 1;
  const name = '第' + count + '组';

  if (useOnline) {
    await supabasePost('groups', { name: name, theme: '', leader_id: null, max_size: 7, sort_order: store.groups.length });
    // Immediately reload to get the real ID
    const data = await supabaseGet('groups', 'order=sort_order');
    store.groups = data.map(mapGroup);
  } else {
    store.groups.push({ id: genId(), name: name, theme: '', leaderId: null, maxSize: 7, order: store.groups.length });
    saveLocalStore(store);
  }
}

async function updateGroupDb(groupId, data) {
  if (useOnline) {
    const dbData = {};
    if (data.theme !== undefined) dbData.theme = data.theme;
    if (data.name !== undefined) dbData.name = data.name;
    if (data.leaderId !== undefined) dbData.leader_id = data.leaderId;
    if (data.maxSize !== undefined) dbData.max_size = data.maxSize;
    if (data.order !== undefined) dbData.sort_order = data.order;
    await supabasePatch('groups', groupId, dbData);
  } else {
    const g = store.groups.find(x => x.id === groupId);
    if (g) { Object.assign(g, data); saveLocalStore(store); }
  }
}

async function deleteGroupDb(groupId) {
  if (useOnline) {
    // Reset members first, then delete group
    const members = store.participants.filter(p => p.groupId === groupId);
    for (const m of members) {
      await supabasePatch('participants', m.id, { group_id: null });
    }
    await supabaseDelete('groups', groupId);
  } else {
    store.participants.forEach(p => { if (p.groupId === groupId) p.groupId = null; });
    store.groups = store.groups.filter(g => g.id !== groupId);
    saveLocalStore(store);
  }
}

async function setPhaseDb(phase) {
  store.phase = phase;
  if (useOnline) {
    await supabasePatch('settings', 'main', { phase: phase });
  } else {
    saveLocalStore(store);
  }
}

// ----- Requests -----
async function addRequestDb(participantId, groupId) {
  if (useOnline) {
    await supabasePost('requests', { participant_id: participantId, group_id: groupId, status: 'pending' });
  } else {
    store.requests.push({ id: genId(), participantId, groupId, status: 'pending', createdAt: Date.now() });
    saveLocalStore(store);
  }
}

async function approveRequestDb(requestId) {
  if (useOnline) {
    await supabasePatch('requests', requestId, { status: 'approved' });
  } else {
    const r = store.requests.find(x => x.id === requestId);
    if (r) { r.status = 'approved'; saveLocalStore(store); }
  }
}

async function rejectRequestDb(requestId) {
  if (useOnline) {
    await supabasePatch('requests', requestId, { status: 'rejected' });
  } else {
    store.requests = store.requests.filter(x => x.id !== requestId);
    saveLocalStore(store);
  }
}

async function resetAllDb() {
  if (useOnline) {
    for (const p of store.participants) { await supabaseDelete('participants', p.id); }
    for (const g of store.groups) { await supabaseDelete('groups', g.id); }
    for (const r of store.requests) { await supabaseDelete('requests', r.id); }
    await supabasePatch('settings', 'main', { phase: 'signup', admin_password: DEFAULT_ADMIN_PASSWORD });
    store = { participants: [], groups: [], requests: [], phase: 'signup' };
  } else {
    localStorage.removeItem('group_signup_data');
    store = { participants: [], groups: [], requests: [], phase: 'signup' };
  }
  clearCurrentUser();
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

async function syncStoreFromLocal() {
  store = getLocalStore();
}

function showToast(msg, duration = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), duration);
}

function getGroupColor(i) {
  const colors = [
    '#92400E','#B45309','#A16207','#854D0E','#713F12',
    '#9A3412','#7C2D12','#57534E','#44403C','#78716C',
    '#CA8A04','#A16207'
  ];
  return colors[i % colors.length];
}

function getGroupEmoji(i) {
  const emojis = ['🌟','💡','📚','⚡','🎯','🔮','🌱','💎','🎨','🔥','🧠','🚀'];
  return emojis[i % emojis.length];
}

function getInitial(name) {

}

// ============================================================
function renderSignin() {
  const currentUser = getCurrentUser();
  const signedCount = store.participants.length;
  const pct = TOTAL_TARGET > 0 ? Math.min(100, Math.round(signedCount / TOTAL_TARGET * 100)) : 0;

  document.getElementById('counter').textContent = signedCount;
  document.getElementById('progress-fill').style.width = pct + '%';

  if (store.phase !== 'signup') {
    // If phase moved on, show message
    document.getElementById('signin-form-card').classList.add('hidden');
    document.getElementById('signin-done-card').classList.remove('hidden');
    if (currentUser) {
      document.getElementById('signed-name').textContent = currentUser.nickname;
    }
    return;
  }

  if (currentUser && currentUser.groupId) {
    // User already in a group
    document.getElementById('signin-form-card').classList.add('hidden');
    document.getElementById('signin-done-card').classList.add('hidden');
    return;
  }

  if (currentUser) {
    // Signed in, waiting
    document.getElementById('signin-form-card').classList.add('hidden');
    document.getElementById('signin-done-card').classList.remove('hidden');
    document.getElementById('signed-name').textContent = currentUser.nickname;
  } else {
    // Not signed in yet
    document.getElementById('signin-form-card').classList.remove('hidden');
    document.getElementById('signin-done-card').classList.add('hidden');
  }
}

// ============================================================
// Render: Group Selection
// ============================================================
function renderSelection() {
  const container = document.getElementById('group-list');
  const currentUser = getCurrentUser();
  if (!currentUser) {
    container.innerHTML = '<div class="status-card"><span class="status-icon">🔒</span><h3>请先签到</h3><p>你需要先完成签到才能选组</p></div>';
    return;
  }

  if (currentUser.groupId && store.phase === 'selection') {
    // They already joined a group, redirect to mygroup after a brief view
  }

  if (store.groups.length === 0) {
    container.innerHTML = '<div class="status-card"><span class="status-icon">⏳</span><h3>小组准备中</h3><p>管理员正在设置小组，请稍候</p></div>';
    return;
  }

  let html = '';
  if (store.phase === 'done' && !currentUser.groupId) {
    html += '<div class="status-card" style="margin-bottom:16px;"><span class="status-icon">🏁</span><h3>选组已结束</h3><p>以下是各组最终情况</p></div>';
  }

  store.groups.forEach((g, i) => {
    const memberCount = store.participants.filter(p => p.groupId === g.id).length;
    const isFull = memberCount >= g.maxSize;
    const isMyGroup = currentUser.groupId === g.id;
    const members = store.participants.filter(p => p.groupId === g.id);
    const leader = store.participants.find(p => p.id === g.leaderId);

    html += `<div class="group-card ${isFull ? 'full' : ''} ${isMyGroup ? 'selected' : ''}" data-group-id="${g.id}">`;
    html += `<div class="group-card-header">`;
    html += `<span class="group-theme">${getGroupEmoji(i)} ${g.theme || g.name}</span>`;
    html += `<span class="group-capacity ${isFull ? 'capacity-full' : 'capacity-open'}">${memberCount}/${g.maxSize} ${isFull ? '已满' : ''}</span>`;
    html += `</div>`;
    html += `<div class="group-leader">👑 组长：${leader ? leader.nickname : (g.leaderId ? '(已指定)' : '待定')}</div>`;

    if (members.length > 0) {
      html += `<div class="group-people">`;
      members.forEach(m => {
        const isLeader = m.id === g.leaderId;
        html += `<span class="person-tag ${isLeader ? 'leader' : ''}">${isLeader ? '👑' : '👤'} ${m.nickname}</span>`;
      });
      html += `</div>`;
    }

    if (store.phase !== 'done') {
      if (isMyGroup) {
        html += `<button class="btn btn-outline btn-sm" onclick="event.stopPropagation();leaveGroup()">退出此组</button>`;
      } else if (!isFull) {
        const hasReq = store.requests.some(r => r.participantId === currentUser.id && r.groupId === g.id && r.status === 'pending');
        if (hasReq) {
          html += `<button class="btn btn-outline btn-sm" disabled style="opacity:0.6;">等待组长审批...</button>`;
        } else {
          const btnLabel = g.leaderId ? '申请加入' : '加入这个组';
          html += `<button class="btn btn-primary btn-sm" onclick="event.stopPropagation();joinGroup('${g.id}')">${btnLabel}</button>`;
        }
      }
    }
    html += `</div>`;
  });

  container.innerHTML = html;
}

// ============================================================
// Render: My Group
// ============================================================
function renderMyGroup() {
  const container = document.getElementById('view-mygroup');
  const currentUser = getCurrentUser();

  if (!currentUser || !currentUser.groupId) {
    container.innerHTML = '';
    return;
  }

  const group = store.groups.find(g => g.id === currentUser.groupId);
  if (!group) {
    container.innerHTML = '';
    return;
  }

  const members = store.participants.filter(p => p.groupId === group.id);
  const leader = store.participants.find(m => m.id === group.leaderId);

  let html = '<div class="my-group-card">';
  html += '<div class="my-group-header">';
  html += '<span class="check-icon">✅</span>';
  html += `<h3>你已加入：${group.theme || group.name}</h3>`;
  html += `<div class="my-group-theme">👑 组长：${leader ? leader.nickname : '待定'}</div>`;
  html += '</div>';

  html += '<div class="member-list">';
  html += '<div style="font-size:var(--font-sm);font-weight:600;color:var(--text-light);margin-bottom:8px;">组员列表</div>';
  members.forEach(m => {
    const isLeader = m.id === group.leaderId;
    const isYou = m.id === currentUser.id;
    const bgColor = getGroupColor(store.groups.indexOf(group));
    html += '<div class="member-item">';
    html += '<div class="member-info">';
    html += `<div class="member-avatar" style="background:${bgColor}">${getInitial(m.nickname)}</div>`;
    html += '<div>';
    html += `<div class="member-name">${m.nickname} ${isYou ? '(你)' : ''}</div>`;
    html += `<div class="member-wechat">联系方式：${m.wechatId}</div>`;
    html += '</div>';
    html += '</div>';
    if (isLeader) {
      html += '<span class="member-badge badge-leader">组长</span>';
    } else if (isYou) {
      html += '<span class="member-badge badge-you">你</span>';
    }
    html += '</div>';
  });
  html += '</div>';

  html += `<button class="btn btn-outline btn-sm" id="btn-edit-info" style="margin-top:12px;width:100%;">✏️ 编辑我的信息</button>`;
  if (store.phase !== 'done') {
    html += `<button class="btn btn-outline btn-sm" id="btn-leave-group" style="margin-top:8px;width:100%;">退出此组，换到其他组</button>`;
  }
  html += '</div>';

  container.innerHTML = html;

  // Bind edit button
  const editBtn = document.getElementById('btn-edit-info');
  if (editBtn) {
    editBtn.addEventListener('click', enterEditMode);
  }

  // Bind leave button
  const leaveBtn = document.getElementById('btn-leave-group');
  if (leaveBtn) {
    leaveBtn.addEventListener('click', leaveGroup);
  }
}

async function doSignin() {
  const nickname = document.getElementById('input-nickname').value.trim();
  const wechatId = document.getElementById('input-wechat').value.trim();
  const btn = document.getElementById('btn-signin');
  const isEditing = btn.dataset.editing === 'true';
  const currentUser = getCurrentUser();

  if (!nickname) { showToast('请输入昵称'); return; }
  if (!wechatId) { showToast('请输入微信号或手机号'); return; }

  if (isEditing && currentUser) {
    // Update existing participant
    const groupId = currentUser.groupId;
    if (useOnline) {
      await supabasePatch('participants', currentUser.id, { nickname: nickname, wechat_id: wechatId });
    } else {
      const p = store.participants.find(x => x.id === currentUser.id);
      if (p) { p.nickname = nickname; p.wechatId = wechatId; saveLocalStore(store); }
    }
    setCurrentUser({ id: currentUser.id, nickname, wechatId, groupId: groupId });
    btn.textContent = '提交签到';
    btn.dataset.editing = 'false';
    document.getElementById('input-nickname').value = '';
    document.getElementById('input-wechat').value = '';
    document.getElementById('btn-cancel-edit').classList.add('hidden');
    document.getElementById('signin-hint').classList.remove('hidden');
    showToast('信息已更新 ✅');
  } else {
    // Check duplicate by wechatId (only for new signups)
    const existing = await findParticipantByWechat(wechatId);
    if (existing && (!currentUser || existing.id !== currentUser.id)) {
      // Update existing
      if (useOnline) {
        await supabasePatch('participants', existing.id, { nickname: nickname });
      } else {
        const p = store.participants.find(x => x.id === existing.id);
        if (p) { p.nickname = nickname; saveLocalStore(store); }
      }
      setCurrentUser({ id: existing.id, nickname, wechatId, groupId: existing.groupId || null });
    } else {
      await addParticipant({ nickname, wechatId });
      const created = await findParticipantByWechat(wechatId);
      if (created) {
        setCurrentUser({ id: created.id, nickname, wechatId, groupId: null });
      }
    }

    document.getElementById('input-nickname').value = '';
    document.getElementById('input-wechat').value = '';
    showToast('签到成功！✅');
  }

  refreshUI();
}

function enterEditMode() {
  const currentUser = getCurrentUser();
  if (currentUser) {
    document.getElementById('input-nickname').value = currentUser.nickname || '';
    document.getElementById('input-wechat').value = currentUser.wechatId || '';
  }
  const btn = document.getElementById('btn-signin');
  btn.textContent = '保存修改';
  btn.dataset.editing = 'true';
  document.getElementById('btn-cancel-edit').classList.remove('hidden');
  document.getElementById('signin-hint').classList.add('hidden');
  document.getElementById('signin-form-card').classList.remove('hidden');
  document.getElementById('signin-done-card').classList.add('hidden');
  document.getElementById('view-selection').classList.add('hidden');
  document.getElementById('view-mygroup').classList.add('hidden');
  window.scrollTo(0, 0);
}

function cancelEdit() {
  document.getElementById('input-nickname').value = '';
  document.getElementById('input-wechat').value = '';
  const btn = document.getElementById('btn-signin');
  btn.textContent = '提交签到';
  btn.dataset.editing = 'false';
  document.getElementById('btn-cancel-edit').classList.add('hidden');
  document.getElementById('signin-hint').classList.remove('hidden');
  refreshUI();
}

function doResign() {
  enterEditMode();
}

async function joinGroup(groupId) {
  const currentUser = getCurrentUser();
  if (!currentUser) { showToast('请先签到'); return; }

  const group = store.groups.find(g => g.id === groupId);
  if (!group) { showToast('小组不存在'); return; }

  const memberCount = store.participants.filter(p => p.groupId === groupId).length;
  if (memberCount >= group.maxSize) { showToast('该小组已满员'); return; }

  // Check for existing pending request
  const existingReq = store.requests.find(r => r.participantId === currentUser.id && r.groupId === groupId && r.status === 'pending');
  if (existingReq) { showToast('已申请，等待组长审批中...'); return; }

  if (group.leaderId) {
    // Group has leader → create approval request
    await addRequestDb(currentUser.id, groupId);
    showToast('已发送入组申请，等待组长审批 ✋');
  } else {
    // No leader → join immediately
    await updateParticipantGroup(currentUser.id, groupId);
    currentUser.groupId = groupId;
    setCurrentUser(currentUser);
    showToast(`已加入 ${group.theme || group.name}！`);
  }
  refreshUI();
}

async function leaveGroup() {
  const currentUser = getCurrentUser();
  if (!currentUser || !currentUser.groupId) return;

  await updateParticipantGroup(currentUser.id, null);
  currentUser.groupId = null;
  setCurrentUser(currentUser);
  showToast('已退出小组');
  refreshUI();
}

}

function addGroup() {
  addGroupDb().then(() => { renderAdmin(); });
}

async function deleteGroup(groupId) {
  if (!confirm('确定删除这个小组吗？组内成员将回到待选状态。')) return;
  await deleteGroupDb(groupId);
  renderAdmin();
  refreshUI();
}

function saveGroup(groupId) {
  const theme = document.getElementById('theme-' + groupId);
  const leader = document.getElementById('leader-' + groupId);
  const maxsize = document.getElementById('maxsize-' + groupId);

  if (!theme || !leader || !maxsize) {
    showToast('找不到该小组，请刷新页面');
    return;
  }

  const data = {
    theme: theme.value.trim(),
    leaderId: leader.value || null,
    maxSize: Math.max(2, Math.min(20, parseInt(maxsize.value) || 7)),
  };

  const oldGroup = store.groups.find(x => x.id === groupId);
  const oldLeaderId = oldGroup ? oldGroup.leaderId : null;

  updateGroupDb(groupId, data).then(async () => {
    // Update local store immediately
    const g = store.groups.find(x => x.id === groupId);
    if (g) Object.assign(g, data);

    // If leader changed to a new person, auto-add them to the group
    if (data.leaderId && data.leaderId !== oldLeaderId) {
      await updateParticipantGroup(data.leaderId, groupId);
    }

    showToast('已保存 ✅', 1500);
    refreshUI();
  });
}

async function resetAll() {
  if (!confirm('⚠️ 确定清空全部数据吗？此操作不可恢复！')) return;
  if (!confirm('再次确认：清空所有签到记录和小组设置？')) return;
  await resetAllDb();
  store = { participants: [], groups: [], requests: [], phase: 'signup' };
  showToast('已清空全部数据');
  refreshUI();
  renderAdmin();
}

function exportData() {
  // Build CSV with BOM for Excel Chinese support
  let csv = '﻿组名,主题,组长,昵称,联系方式,角色\n';

  // Sort groups by order
  const sortedGroups = [...store.groups].sort((a, b) => (a.order || 0) - (b.order || 0));

  sortedGroups.forEach(g => {
    const members = store.participants.filter(p => p.groupId === g.id);
    const leader = store.participants.find(p => p.id === g.leaderId);
    const leaderName = leader ? leader.nickname : '待定';

    if (members.length === 0) {
      csv += `${csvEscape(g.name)},${csvEscape(g.theme || '未设置')},${csvEscape(leaderName)},,,\n`;
    } else {
      members.forEach(p => {
        const isLeader = p.id === g.leaderId;
        const role = isLeader ? '组长' : '组员';
        csv += `${csvEscape(g.name)},${csvEscape(g.theme || '未设置')},${csvEscape(leaderName)},${csvEscape(p.nickname)},${csvEscape(p.wechatId)},${role}\n`;
      });
    }
  });

  // Unassigned participants
  const unassigned = store.participants.filter(p => !p.groupId);
  if (unassigned.length > 0) {
    unassigned.forEach(p => {
      csv += `未分配,,,${csvEscape(p.nickname)},${csvEscape(p.wechatId)},待定\n`;
    });
  }

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '小组分组结果-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV 已导出');
}

function csvEscape(str) {
  str = String(str || '');
  if (str.includes(',') || str.includes('"') || str.includes('\n')) {
    return '"' + str.replace(/"/g, '""') + '"';
  }
  return str;
}

async function removeParticipant(participantId) {
  const p = store.participants.find(x => x.id === participantId);
  if (!p) return;
  if (!confirm(`确定移除 ${p.nickname} 吗？ta需要重新签到。`)) return;
  // Also clear from group leader reference
  if (useOnline) {
    const groupsWithLeader = store.groups.filter(g => g.leaderId === participantId);
    for (const g of groupsWithLeader) {
      await supabasePatch('groups', g.id, { leader_id: null });
    }
    await supabaseDelete('participants', participantId);
  } else {
    store.participants = store.participants.filter(x => x.id !== participantId);
    store.groups.forEach(g => { if (g.leaderId === participantId) g.leaderId = null; });
    saveLocalStore(store);
  }
  renderAdmin();
  refreshUI();
  showToast(`已移除 ${p.nickname}`);
}

// ============================================================
// Leader Panel
// ============================================================
function getLeaderGroups() {
  const currentUser = getCurrentUser();
  if (!currentUser) return [];
  return store.groups.filter(g => g.leaderId === currentUser.id);
}

function openLeaderPanel() {
  const leaderGroups = getLeaderGroups();
  if (leaderGroups.length === 0) {
    showToast('你没有管理的小组');
    return;
  }
  document.getElementById('leader-panel').classList.add('active');
  document.getElementById('view-signin').classList.add('hidden');
  document.getElementById('view-selection').classList.add('hidden');
  document.getElementById('view-mygroup').classList.add('hidden');
  document.getElementById('admin-panel').classList.remove('active');
  renderLeaderPanel();
}

function renderLeaderPanel() {
  const leaderGroups = getLeaderGroups();
  document.getElementById('leader-group-info').textContent =
    '你管理的组：' + leaderGroups.map(g => g.theme || g.name).join('、');

  let html = '';
  let hasAny = false;

  leaderGroups.forEach(g => {
    const pendingRequests = store.requests.filter(r => r.groupId === g.id && r.status === 'pending');
    if (pendingRequests.length > 0) hasAny = true;

    pendingRequests.forEach(r => {
      const p = store.participants.find(x => x.id === r.participantId);
      html += '<div class="admin-group-item" style="display:flex;align-items:center;justify-content:space-between;">';
      html += '<div>';
      html += `<strong>${p ? p.nickname : '未知'}</strong>`;
      html += `<span style="font-size:var(--font-xs);color:var(--text-light);margin-left:8px;">${p ? p.wechatId : ''}</span>`;
      html += `<span style="font-size:var(--font-xs);color:var(--text-lighter);margin-left:4px;">→ ${g.theme || g.name}</span>`;
      html += '</div>';
      html += '<div style="display:flex;gap:6px;">';
      html += `<button class="btn btn-primary btn-sm" onclick="approveRequest('${r.id}','${r.participantId}','${r.groupId}')">✅ 同意</button>`;
      html += `<button class="btn btn-outline btn-sm" style="border-color:#DC2626;color:#DC2626;" onclick="rejectRequest('${r.id}')">拒绝</button>`;
      html += '</div>';
      html += '</div>';
    });
  });

  if (!hasAny) {
    html = '<p style="color:var(--text-lighter);text-align:center;padding:20px;">暂无待审批的入组申请</p>';
  }

  document.getElementById('leader-requests').innerHTML = html;
}

async function approveRequest(requestId, participantId, groupId) {
  const group = store.groups.find(g => g.id === groupId);
  if (!group) { showToast('小组不存在'); return; }

  const memberCount = store.participants.filter(p => p.groupId === groupId).length;
  if (memberCount >= group.maxSize) { showToast('该小组已满员，无法通过'); return; }

  await approveRequestDb(requestId);
  await updateParticipantGroup(participantId, groupId);
  // Update current user if it's them
  const currentUser = getCurrentUser();
  if (currentUser && currentUser.id === participantId) {
    currentUser.groupId = groupId;
    setCurrentUser(currentUser);
  }
  showToast('已同意入组 ✅');
  renderLeaderPanel();
  refreshUI();
}

async function rejectRequest(requestId) {
  await rejectRequestDb(requestId);
  showToast('已拒绝');
  renderLeaderPanel();
  refreshUI();
}
function renderAdmin() {
  // Phase buttons
  document.querySelectorAll('.phase-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.phase === store.phase);
  });

  // Groups
  let groupsHtml = '';
  store.groups.forEach((g) => {
    const memberCount = store.participants.filter(p => p.groupId === g.id).length;
    const participants = store.participants;
    const gid = g.id.replace(/'/g, "\\'");
    groupsHtml += `<div class="admin-group-item" id="group-${gid}">`;
    groupsHtml += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">`;
    groupsHtml += `<strong>${escapeHtml(g.name)}</strong>`;
    groupsHtml += `<span style="font-size:var(--font-xs);color:var(--text-light)">${memberCount}/${g.maxSize}人</span>`;
    groupsHtml += '</div>';

    groupsHtml += '<div class="admin-group-row">';
    groupsHtml += '<label>主题</label>';
    groupsHtml += `<input type="text" id="theme-${gid}" value="${escapeHtml(g.theme || '')}" placeholder="例如：Agent开发">`;
    groupsHtml += '</div>';

    groupsHtml += '<div class="admin-group-row">';
    groupsHtml += '<label>组长</label>';
    groupsHtml += `<select id="leader-${gid}">`;
    groupsHtml += '<option value="">-- 选择组长 --</option>';
    participants.forEach(p => {
      const selected = p.id === g.leaderId ? ' selected' : '';
      groupsHtml += `<option value="${p.id}"${selected}>${escapeHtml(p.nickname)}</option>`;
    });
    groupsHtml += '</select>';
    groupsHtml += '</div>';

    groupsHtml += '<div class="admin-group-row">';
    groupsHtml += '<label>上限</label>';
    groupsHtml += `<input type="number" id="maxsize-${gid}" value="${g.maxSize}" min="2" max="20">`;
    groupsHtml += '</div>';

    groupsHtml += `<div style="display:flex;gap:8px;margin-top:8px;">`;
    groupsHtml += `<button class="btn btn-primary btn-sm" style="flex:1;" onclick="saveGroup('${gid}')">💾 保存</button>`;
    groupsHtml += `<button class="btn btn-outline btn-sm" style="border-color:#DC2626;color:#DC2626;" onclick="deleteGroup('${gid}')">删除</button>`;
    groupsHtml += `</div>`;
    groupsHtml += '</div>';
  });

  if (store.groups.length === 0) {
    groupsHtml = '<p style="color:var(--text-lighter);text-align:center;padding:20px;">还没有小组，点击下方按钮创建</p>';
  }

  document.getElementById('admin-groups').innerHTML = groupsHtml;

  // Participant count
  document.getElementById('admin-participant-count').textContent = store.participants.length;

  // Participant list
  let partHtml = '';
  store.participants.forEach(p => {
    const group = store.groups.find(g => g.id === p.groupId);
    const isLeader = store.groups.some(g => g.leaderId === p.id);
    partHtml += `<div style="display:inline-flex;align-items:center;gap:4px;margin-right:8px;margin-bottom:4px;background:#F1F5F9;padding:2px 10px;border-radius:100px;font-size:var(--font-xs);">`;
    partHtml += `${isLeader ? '👑' : '👤'} ${p.nickname}`;
    if (group) partHtml += ` <span style="color:var(--primary)">[${group.theme || group.name}]</span>`;
    partHtml += ` <span style="color:var(--text-lighter)">${p.wechatId}</span>`;
    partHtml += `<span style="cursor:pointer;color:#DC2626;margin-left:2px;" onclick="removeParticipant('${p.id}')" title="移除">✕</span>`;
    partHtml += '</div>';
  });
  if (store.participants.length === 0) {
    partHtml = '<span style="color:var(--text-lighter)">还没有人签到</span>';
  }
  document.getElementById('admin-participants').innerHTML = partHtml;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ============================================================
// Main Render
// ============================================================
function refreshUI() {
  const currentUser = getCurrentUser();
  const adminPanelActive = document.getElementById('admin-panel').classList.contains('active');
  const leaderPanelActive = document.getElementById('leader-panel').classList.contains('active');

  // Show/hide leader link
  const leaderLink = document.getElementById('link-leader');
  const footerSep = document.getElementById('footer-sep');
  const leaderGroups = currentUser ? store.groups.filter(g => g.leaderId === currentUser.id) : [];
  if (leaderLink && footerSep) {
    if (leaderGroups.length > 0) {
      leaderLink.classList.remove('hidden');
      footerSep.classList.remove('hidden');
      const pendingCount = store.requests.filter(r => leaderGroups.some(g => g.id === r.groupId) && r.status === 'pending').length;
      leaderLink.textContent = pendingCount > 0 ? `组长面板 (${pendingCount}条申请)` : '组长面板';
    } else {
      leaderLink.classList.add('hidden');
      footerSep.classList.add('hidden');
    }
  }

  // Decide which view to show
  const viewSignin = document.getElementById('view-signin');
  const viewSelection = document.getElementById('view-selection');
  const viewMygroup = document.getElementById('view-mygroup');

  if (adminPanelActive || leaderPanelActive) {
    viewSignin.classList.add('hidden');
    viewSelection.classList.add('hidden');
    viewMygroup.classList.add('hidden');
    if (leaderPanelActive) renderLeaderPanel();
    return;
  }

  if (store.phase === 'signup') {
    viewSignin.classList.remove('hidden');
    viewSelection.classList.add('hidden');
    viewMygroup.classList.add('hidden');
    renderSignin();
  } else if (store.phase === 'selection' || store.phase === 'done') {
    if (currentUser && currentUser.groupId) {
      // User is in a group - show my group + selection below
      viewSignin.classList.add('hidden');
      viewSelection.classList.remove('hidden');
      viewMygroup.classList.remove('hidden');
      renderMyGroup();
      renderSelection();
    } else if (currentUser) {
      // Signed in but no group
      viewSignin.classList.add('hidden');
      viewSelection.classList.remove('hidden');
      viewMygroup.classList.add('hidden');
      renderSelection();
    } else {
      // Not signed in
      viewSignin.classList.remove('hidden');
      viewSelection.classList.add('hidden');
      viewMygroup.classList.add('hidden');
      renderSignin();
    }
  }

  renderAdmin();
}

// ============================================================
// Init
// ============================================================
async function init() {
  // Always start with localStorage so page is instantly usable
  const localStore = getLocalStore();
  store = localStore;
  if (!store.groups) store.groups = [];
  if (!store.participants) store.participants = [];
  if (!store.requests) store.requests = [];
  if (!store.phase) store.phase = 'signup';
  refreshUI();

  // Try Supabase in background
  useOnline = await initSupabase();
  if (useOnline) {
    showToast('已连接线上模式 ☁️', 3000);
  }

  // Update mode badge
  const badge = document.getElementById('mode-badge');
  const hint = document.getElementById('firebase-hint');
  if (badge && hint) {
    if (useOnline) {
      badge.textContent = '☁️ Supabase 线上模式';
      badge.style.background = '#E3F2FD';
      badge.style.color = '#1565C0';
      hint.textContent = '数据实时同步，所有人可见。';
    } else {
      badge.textContent = '💻 本地模式';
      badge.style.background = '#F1F5F9';
      badge.style.color = '#475569';
      hint.textContent = '当前为本地模式，数据仅保存在此浏览器。';
    }
  }

  // Auto-login admin if session exists
  if (localStorage.getItem('group_signup_admin_session')) {
    document.getElementById('admin-panel').classList.add('active');
    document.getElementById('link-admin').classList.add('hidden');
    renderAdmin();
  }

  refreshUI();
}

init();
</script>
